# Puerto (Render inyecta la variable PORT; en local usa 8080 por defecto)
server.port=${PORT:8080}

# Configuraci\u00f3n din\u00e1mica para Cloud (Render) y Local
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sgi_db?serverTimezone=UTC&useSSL=true&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

# Configuraci\u00f3n de Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}

# --- CARGA DE DATOS SEMILLA (data.sql) ---
# TEMPORAL: solo para la primera carga de datos a Aiven.
# Una vez confirmado que los datos se cargaron bien, ELIMINA estas 2 líneas
# (o pon spring.sql.init.mode=never) para que no se vuelva a ejecutar en cada redeploy.
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
