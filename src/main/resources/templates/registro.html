<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - Sistema de Gestión de Incidencias</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .registro-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #218838; }
        .error-msj { color: red; font-size: 14px; margin-bottom: 10px; }
        .link-login { display: block; margin-top: 15px; font-size: 14px; color: #0056b3; text-decoration: none; }
    </style>
</head>
<body>

    <div class="registro-container">
        <h2>Crear Cuenta</h2>
        
        <div th:if="${error}" class="error-msj">
            <p th:text="${error}"></p>
        </div>

        <form action="/registro" method="post">
            <input type="text" name="nombres" placeholder="Nombres" required>
            <input type="text" name="apellidos" placeholder="Apellidos" required>
            <input type="email" name="correo" placeholder="Correo de la institución" required>
            <input type="password" name="contrasena" placeholder="Contraseña" required>
            
            <select name="rol" required>
                <option value="" disabled selected>Selecciona tu rol...</option>
                <option value="docente">Docente</option>
                <option value="administrador">Administrador</option>
                <option value="soporte ti">Soporte TI</option>
            </select>
            
            <button type="submit">Registrar Usuario</button>
        </form>
        
        <a href="/login" class="link-login">¿Ya tienes cuenta? Inicia sesión aquí</a>
    </div>

</body>
</html>
