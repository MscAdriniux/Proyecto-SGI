<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema de Incidencias</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/estilos.css}">
</head>

<body class="d-flex flex-column align-items-center justify-content-center min-vh-100 position-relative">

    <button class="theme-toggle" id="themeToggleBtn" aria-label="Cambiar tema">
        <i class="fa-regular fa-moon" id="themeIcon"></i>
    </button>

    <div class="text-center mb-4 mt-3">
        <div class="logo-circle mb-3">
            <i class="fa-solid fa-graduation-cap"></i>
        </div>
        <h2 class="fw-bold mb-1" style="letter-spacing: -0.5px;">Sistema de Incidencias</h2>
        <div class="subtitle">Universidad Tecnológica del Perú</div>
    </div>

    <div class="login-card" style="width: 100%; max-width: 480px;">
        <h4 class="text-center fw-bold mb-4">Crear Cuenta</h4>

        <div th:if="${error}" class="alert alert-danger text-center p-2 mb-3" role="alert" style="font-size: 0.9rem;">
            <p class="m-0" th:text="${error}"></p>
        </div>

        <form action="/registro" method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nombres</label>
                    <input type="text" name="nombres" class="form-control" style="border-left: 1px solid var(--border-input); border-top-left-radius: 8px; border-bottom-left-radius: 8px;" placeholder="Ej: Juan" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Apellidos</label>
                    <input type="text" name="apellidos" class="form-control" style="border-left: 1px solid var(--border-input); border-top-left-radius: 8px; border-bottom-left-radius: 8px;" placeholder="Ej: Pérez" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Correo Institucional</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                    <input type="email" name="correo" class="form-control" placeholder="correo@universidad.edu" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="contrasena" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Rol en el Sistema</label>
                <select name="rol" class="form-select form-control" style="border-left: 1px solid var(--border-input); border-top-left-radius: 8px; border-bottom-left-radius: 8px;" required>
                    <option value="" disabled selected>Selecciona tu rol...</option>
                    <option value="docente">Docente</option>
                    <option value="ti">Soporte TI</option>
                    <option value="administrador">Administrador</option>
                </select>
            </div>

            <button type="submit" class="btn btn-login w-100 mb-3">Registrar Usuario</button>
            
            <div class="text-center">
                <a href="/login" class="text-decoration-none small text-muted">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/script.js}"></script>
    
</body>
</html>
