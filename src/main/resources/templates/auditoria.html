<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría del Sistema - SGI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/estilos.css}">
</head>
<body class="dashboard-body">

    <div class="admin-layout">
        <!-- Sidebar del sistema -->
        <div th:replace="~{sidebar-admin :: sidebar('auditoria')}"></div>

        <div class="admin-main-content">
            <!-- Navbar estándar -->
            <nav class="navbar navbar-expand-lg border-bottom px-4 py-3 bg-nav mb-4">
                <div class="container-fluid">
                    <div>
                        <h4 class="mb-0 fw-bold">Sistema de Incidencias</h4>
                        <small class="text-muted">Gestión de Auditoría Global</small>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <button class="theme-toggle position-static m-0" id="themeToggleBtn">
                            <i class="fa-regular fa-moon" id="themeIcon"></i>
                        </button>
                        <a href="/logout" class="btn btn-light border fw-bold px-3 py-2 rounded-3 text-dark btn-logout">
                            <i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Cerrar Sesión
                        </a>
                    </div>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4">
                <!-- Título -->
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="card shadow border-0" style="background-color: var(--bg-card); border-color: var(--border-card);">
                            <div class="card-body">
                                <h2 class="fw-bold mb-1"><i class="fa-solid fa-shield-halved text-primary"></i> Auditoría del Sistema</h2>
                                <p class="text-muted mb-0">Monitoreo de eventos registrados mediante Logback.</p>
                            </div>
                        </div>
                    </div>
                </div>
                    
                <!-- Tarjetas de Resumen -->
                <div class="row mb-4 g-3">
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm" style="background-color: var(--bg-card); border: 1px solid var(--border-card);">
                            <div class="card-body text-center">
                                <h6 class="text-muted">INFO</h6>
                                <h2 class="text-success"><span th:text="${info}">0</span></h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm" style="background-color: var(--bg-card); border: 1px solid var(--border-card);">
                            <div class="card-body text-center">
                                <h6 class="text-muted">WARN</h6>
                                <h2 class="text-warning"><span th:text="${warn}">0</span></h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm" style="background-color: var(--bg-card); border: 1px solid var(--border-card);">
                            <div class="card-body text-center">
                                <h6 class="text-muted">ERROR</h6>
                                <h2 class="text-danger"><span th:text="${error}">0</span></h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm" style="background-color: var(--bg-card); border: 1px solid var(--border-card);">
                            <div class="card-body text-center">
                                <h6 class="text-muted">TOTAL</h6>
                                <h2 class="text-primary"><span th:text="${logs != null ? logs.size() : 0}">0</span></h2>
                            </div>
                        </div>
                    </div>
                </div>
                    
                <!-- Tabla de Auditoría -->
                <div class="card shadow-sm p-4" style="background-color: var(--bg-card); border-color: var(--border-card);">
                    <div class="table-responsive">
                        <table class="table table-custom table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Nivel</th>
                                    <th>Módulo</th>
                                    <th>Usuario</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="log : ${logs}" class="fila-auditoria">
                                    <td th:text="${#temporals.format(log.fecha, 'dd/MM/yyyy HH:mm:ss')}"></td>
                                    <td>
                                        <span class="badge rounded-pill px-2 py-1" 
                                              th:classappend="${log.nivel == 'ERROR' ? 'bg-danger-subtle text-danger' : (log.nivel == 'WARN' ? 'bg-warning-subtle text-warning' : 'bg-success-subtle text-success')}" 
                                              th:text="${log.nivel}">INFO</span>
                                    </td>
                                    <td class="fw-bold" th:text="${log.modulo}"></td>
                                    <td th:text="${log.usuario}"></td>
                                    <td th:text="${log.accion}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <nav aria-label="Navegación de auditoría" id="paginacion-auditoria-container" class="mt-4 mb-0" style="display: none;">
                        <ul class="pagination justify-content-center" id="paginacion-auditoria-ul"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/script.js}"></script>
    <script th:src="@{/paginador.js}"></script>
    <script th:src="@{/auditoria.js}"></script>
</body>
</html>
