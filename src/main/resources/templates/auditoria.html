<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría - SGI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet"
          th:href="@{/estilos.css}">
    
    <script>
    const tema = localStorage.getItem("tema_preferido");

    if (tema === "dark") {
        document.documentElement.setAttribute("data-theme","dark");
    }
    </script>
</head>

<body class="dashboard-body">

<div class="admin-layout">

    <div th:replace="~{sidebar-admin :: sidebar('auditoria')}"></div>

    <div class="admin-main-content">

        <nav class="navbar navbar-expand-lg border-bottom px-4 py-3 bg-nav">

            <div class="container-fluid">

                <div>
                    <h4 class="mb-0 fw-bold">Sistema de Incidencias</h4>

                    <small class="text-muted">
                        <span th:text="${usuarioLogueado.nombres + ' ' + usuarioLogueado.apellidos}"></span>
                        • Auditoría del Sistema
                    </small>
                </div>

                <div class="d-flex align-items-center gap-3">

                    <button class="theme-toggle position-static m-0"
                            id="themeToggleBtn">
                        <i class="fa-regular fa-moon"
                           id="themeIcon"></i>
                    </button>

                    <a href="/admin/panel-admin"
                       class="btn btn-light border fw-bold px-3 py-2 rounded-3 text-dark">
                        <i class="fa-solid fa-arrow-left me-2"></i>
                        Volver al Panel
                    </a>

                </div>

            </div>

        </nav>

        <div class="container-fluid px-4 py-4">
            <div class="row g-3 mb-4">

    <div class="col-md-3">
        <div class="summary-card p-3 d-flex align-items-center gap-3">
            <div class="icon-box bg-success-subtle text-success">
                <i class="fa-solid fa-circle-info fa-lg"></i>
            </div>
            <div>
                <h3 class="mb-0 fw-bold" th:text="${info}">0</h3>
                <span class="text-muted">Eventos INFO</span>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="summary-card p-3 d-flex align-items-center gap-3">
            <div class="icon-box bg-warning-subtle text-warning">
                <i class="fa-solid fa-triangle-exclamation fa-lg"></i>
            </div>
            <div>
                <h3 class="mb-0 fw-bold" th:text="${warn}">0</h3>
                <span class="text-muted">Advertencias</span>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="summary-card p-3 d-flex align-items-center gap-3">
            <div class="icon-box bg-danger-subtle text-danger">
                <i class="fa-solid fa-circle-xmark fa-lg"></i>
            </div>
            <div>
                <h3 class="mb-0 fw-bold" th:text="${error}">0</h3>
                <span class="text-muted">Errores</span>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="summary-card p-3 d-flex align-items-center gap-3">
            <div class="icon-box bg-primary-subtle text-primary">
                <i class="fa-solid fa-list fa-lg"></i>
            </div>
            <div>
                <h3 class="mb-0 fw-bold" th:text="${logs.size()}">0</h3>
                <span class="text-muted">Total de Eventos</span>
            </div>
        </div>
    </div>

</div>

<div class="incidencias-container p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0">
            Historial de Auditoría
        </h5>
    </div>

    <div class="table-responsive">

        <table class="table table-custom table-hover align-middle">

            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Nivel</th>
                    <th>Módulo</th>
                    <th>Usuario</th>
                    <th>Acción</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="log : ${logs}">

                    <td th:text="${log.fechaFormateada}"></td>

                    <td>

                        <span th:if="${log.nivel=='INFO'}"
                              class="badge bg-success">
                            INFO
                        </span>

                        <span th:if="${log.nivel=='WARN'}"
                              class="badge bg-warning text-dark">
                            WARN
                        </span>

                        <span th:if="${log.nivel=='ERROR'}"
                              class="badge bg-danger">
                            ERROR
                        </span>

                    </td>

                    <td th:text="${log.modulo}"></td>

                    <td th:text="${log.usuario}"></td>

                    <td th:text="${log.accion}"></td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

</div>

<footer class="py-4 mt-5 border-top text-center text-muted small shadow-sm"
        style="background-color: var(--bg-nav);">

    <div class="container">

        <span class="fw-bold d-block mb-1">
            <i class="fa-solid fa-shield-halved me-1"></i>
            Sistema de Gestión de Incidentes (SGI)
        </span>

        <span>
            &copy; 2026 Todos los derechos reservados.
        </span>

    </div>

</footer>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/script.js}"></script>

</body>
</html>
