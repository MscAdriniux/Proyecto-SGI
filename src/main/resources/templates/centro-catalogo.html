<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Catálogo - SGI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/estilos.css}">
</head>
<body class="dashboard-body">

    <div class="admin-layout">
        <div th:replace="~{sidebar-admin :: sidebar('catalogo')}"></div>

        <div class="admin-main-content">
            <nav class="navbar navbar-expand-lg border-bottom px-4 py-3 bg-nav mb-4">
                <div class="container-fluid">
                    <div>
                        <h4 class="mb-0 fw-bold">Sistema de Incidencias</h4>
                        <small class="opacity-75 text-dynamic">
                            <span th:text="${usuarioLogueado.nombres} + ' ' + ${usuarioLogueado.apellidos}">Admin</span> • CRUD Catálogo
                        </small>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <button class="theme-toggle position-static m-0" id="themeToggleBtn">
                            <i class="fa-regular fa-moon" id="themeIcon"></i>
                        </button>
                        <a href="/logout" class="btn btn-light border fw-bold px-3 py-2 rounded-3 text-dark btn-logout">
                            <i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Cerrar Sesión
                        </a>
                    </div>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4">
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="metric-card d-flex align-items-center gap-3">
                            <div class="icon-box bg-primary-subtle text-primary"><i class="fa-solid fa-layer-group fa-lg"></i></div>
                            <div>
                                <h3 class="mb-0 fw-bold th-metric" th:text="${catalogo != null ? catalogo.size() : 0}">0</h3>
                                <span class="small fw-bold opacity-75">Tipos de Incidencia Registrados</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-panel p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                        <h5 class="fw-bold mb-0 card-custom-text"><i class="fa-solid fa-clipboard-list me-2"></i>Catálogo de Tipos de Incidencia</h5>
                        <button class="btn btn-dark px-3 py-2 rounded-3" onclick="abrirModalCatalogoNuevo()">
                            <i class="fa-solid fa-plus me-2"></i>Agregar
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-custom align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Categoría</th>
                                    <th>Prioridad</th>
                                    <th class="text-end">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-catalogo-body">
                                <tr>
                                    <td colspan="5" class="text-center py-4 opacity-75">Cargando catálogo...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <nav aria-label="Navegación de catálogo" id="paginacion-catalogo-container" class="mt-4 mb-0" style="display: none;">
                        <ul class="pagination justify-content-center" id="paginacion-catalogo-ul"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCatalogo" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content modal-content-custom">
                <form id="formCatalogo" onsubmit="guardarCatalogoItem(event)">
                    <div class="modal-header border-bottom" style="border-color: var(--border-card) !important;">
                        <h5 class="modal-title fw-bold" id="modalCatalogoLabel">Agregar Incidencia al Catálogo</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="catalogoId">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="catalogoNombre" class="form-control" placeholder="Ej: Proyector no enciende" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <input type="text" id="catalogoCategoria" class="form-control" placeholder="Ej: Hardware" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Prioridad Sugerida</label>
                            <select id="catalogoPrioridad" class="form-select" required>
                                <option value="ALTA">ALTA</option>
                                <option value="MEDIA">MEDIA</option>
                                <option value="BAJA">BAJA</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer border-top" style="border-color: var(--border-card) !important;">
                        <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-dark">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/script.js}"></script>
    <script th:src="@{/paginador.js}"></script>
    <script th:src="@{/catalogo.js}"></script>
</body>
</html>
