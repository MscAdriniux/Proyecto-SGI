<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Soporte TI - SGI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/estilos.css}">
</head>
<body class="dashboard-body"> <nav class="navbar navbar-expand-lg border-bottom px-4 py-3 bg-nav mb-4">
        <div class="container-fluid">
            <div>
                <h4 class="mb-0 fw-bold">Gestión de Incidencias TI</h4>
                <small class="text-muted">
                    <span th:text="${usuarioLogueado.nombres} + ' ' + ${usuarioLogueado.apellidos}">Soporte</span> • Panel de Técnico
                </small>
            </div>
            <div class="d-flex align-items-center gap-3">
                <button class="theme-toggle position-static m-0" id="themeToggleBtn">
                    <i class="fa-regular fa-moon" id="themeIcon"></i>
                </button>
                <a href="/logout" class="btn btn-light border fw-bold px-3 py-2 rounded-3 text-dark btn-logout">
                    <i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Cerrar Sesión
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4 g-3">
            <div class="col-md-4">
                <div class="summary-card p-3 d-flex align-items-center gap-3" style="background-color: var(--bg-card); border: 1px solid var(--border-card); border-radius: 8px;">
                    <div class="icon-box bg-danger-subtle text-danger p-3 rounded-circle"><i class="fa-solid fa-circle-exclamation fa-lg"></i></div>
                    <div>
                        <h3 class="mb-0 fw-bold" style="color: var(--text-main);" th:text="${totalPendientes}">0</h3>
                        <span class="text-muted">Pendientes</span>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="summary-card p-3 d-flex align-items-center gap-3" style="background-color: var(--bg-card); border: 1px solid var(--border-card); border-radius: 8px;">
                    <div class="icon-box bg-primary-subtle text-primary p-3 rounded-circle"><i class="fa-regular fa-clock fa-lg"></i></div>
                    <div>
                        <h3 class="mb-0 fw-bold" style="color: var(--text-main);" th:text="${totalEnProceso}">0</h3>
                        <span class="text-muted">En Proceso</span>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="summary-card p-3 d-flex align-items-center gap-3" style="background-color: var(--bg-card); border: 1px solid var(--border-card); border-radius: 8px;">
                    <div class="icon-box bg-success-subtle text-success p-3 rounded-circle"><i class="fa-regular fa-circle-check fa-lg"></i></div>
                    <div>
                        <h3 class="mb-0 fw-bold" style="color: var(--text-main);" th:text="${totalResueltas}">0</h3>
                        <span class="text-muted">Resueltas</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="incidencias-container p-4 mt-4" style="background-color: var(--bg-card); border: 1px solid var(--border-card); border-radius: 12px;">
            
            <ul class="nav nav-tabs mb-4" id="tiTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active fw-bold text-danger" id="activas-tab" data-bs-toggle="tab" data-bs-target="#activas-pane" type="button" role="tab" aria-selected="true">
                        <i class="fa-solid fa-fire me-1"></i> Entrada
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link fw-bold text-success" id="resueltas-tab" data-bs-toggle="tab" data-bs-target="#resueltas-pane" type="button" role="tab" aria-selected="false">
                        <i class="fa-solid fa-check-double me-1"></i> Historial 
                    </button>
                </li>
            </ul>

            <div class="tab-content" id="tiTabsContent">
                
                <div class="tab-pane fade show active" id="activas-pane" role="tabpanel" tabindex="0">
                    <div th:if="${#lists.isEmpty(incidenciasActivas)}" class="text-center py-5 text-muted">
                        <i class="fa-solid fa-mug-hot fa-3x mb-3"></i>
                        <h5>No hay emergencias pendientes.</h5>
                    </div>

                    <div th:each="incidencia : ${incidenciasActivas}" class="p-3 border rounded-3 mb-3 d-flex justify-content-between align-items-start flex-wrap gap-3" style="border-color: var(--border-card) !important;">
                        <div class="flex-grow-1">
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <h6 class="fw-bold mb-0" style="color: var(--text-main);" th:text="${incidencia.tipoIncidencia}"></h6>
                                <span class="badge" th:classappend="${incidencia.prioridad == 'ALTA' ? 'bg-danger' : (incidencia.prioridad == 'MEDIA' ? 'bg-warning text-dark' : 'bg-success')}" th:text="${incidencia.prioridad}"></span>
                                <span class="badge border" th:classappend="${incidencia.estado == 'PENDIENTE' ? 'border-secondary text-secondary' : 'border-primary text-primary'}" th:text="${incidencia.estado}"></span>
                            </div>
                            <div class="text-muted small d-flex gap-3 flex-wrap">
                                <span><i class="fa-solid fa-location-dot me-1"></i> <span th:text="${incidencia.ubicacion}"></span></span>
                                <span th:if="${incidencia.usuario != null}"><i class="fa-regular fa-user me-1"></i> <span th:text="${incidencia.usuario.nombres}"></span></span>
                            </div>
                        </div>

                        <div class="acciones-tecnico" style="min-width: 250px;">
                            <form th:action="@{/incidencias/actualizar-estado}" method="POST" enctype="multipart/form-data" class="d-flex flex-column gap-2">
                                <input type="hidden" name="idIncidencia" th:value="${incidencia.idIncidencia}"> 
                                
                                <div class="d-flex gap-2">
                                    <select name="nuevoEstado" class="form-select form-select-sm" style="background-color: var(--bg-input); color: var(--text-main); border-color: var(--border-input);" onchange="mostrarInputArchivo(this)">
                                        <option value="EN PROCESO" th:selected="${incidencia.estado == 'EN PROCESO'}">Atender (En Proceso)</option>
                                        <option value="RESUELTA">Marcar como Resuelta</option>
                                    </select>
                                    <button type="submit" class="btn btn-sm btn-primary fw-bold">Actualizar</button>
                                </div>
                                
                                <div class="contenedor-evidencia mt-1" style="display: none;">
                                    <small class="text-muted d-block mb-1"><i class="fa-solid fa-camera"></i> Subir evidencia (opcional)</small>
                                    <input type="file" name="archivoEvidencia" class="form-control form-control-sm" accept="image/png, image/jpeg">
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="resueltas-pane" role="tabpanel" tabindex="0">
                    <div th:if="${#lists.isEmpty(incidenciasResueltas)}" class="text-center py-5 text-muted">
                        <i class="fa-solid fa-folder-open fa-3x mb-3"></i>
                        <h5>El historial está vacío.</h5>
                    </div>

                    <div th:each="incidencia : ${incidenciasResueltas}" class="p-3 border rounded-3 mb-3 d-flex justify-content-between align-items-center flex-wrap gap-3" style="border-color: var(--border-card) !important; opacity: 0.85;">
                        <div class="flex-grow-1">
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <h6 class="fw-bold mb-0 text-muted" style="text-decoration: line-through;" th:text="${incidencia.tipoIncidencia}"></h6>
                                <span class="badge border border-success text-success">RESUELTA</span>
                            </div>
                            <div class="text-muted small d-flex gap-3 flex-wrap">
                                <span><i class="fa-solid fa-location-dot me-1"></i> <span th:text="${incidencia.ubicacion}"></span></span>
                                <span th:if="${incidencia.fechaCierre != null}"><i class="fa-regular fa-clock me-1"></i> Fin: <span th:text="${#temporals.format(incidencia.fechaCierre, 'dd/MM/yyyy HH:mm')}"></span></span>
                            </div>
                        </div>
                        <div th:if="${incidencia.evidenciaUrl != null}">
                            <span class="badge bg-secondary"><i class="fa-solid fa-paperclip me-1"></i> Evidencia Adjunta</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script th:src="@{/script.js}"></script>
    
    <script>
        function mostrarInputArchivo(selectElement) {
            // Busca el div contenedor del input de archivo que está justo debajo del select
            const contenedorEvidencia = selectElement.parentElement.nextElementSibling;
            
            if (selectElement.value === 'RESUELTA') {
                // Efecto de aparición
                contenedorEvidencia.style.display = 'block';
            } else {
                contenedorEvidencia.style.display = 'none';
            }
        }
    </script>
</body>
</html>
