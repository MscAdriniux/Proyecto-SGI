<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Incidencias</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/estilos.css}">
</head>

<body class="d-flex flex-column align-items-center justify-content-center min-vh-100 position-relative">

    <button class="theme-toggle" id="themeToggleBtn" aria-label="Cambiar tema">
        <i class="fa-regular fa-moon" id="themeIcon"></i>
    </button>

    <div class="text-center mb-4 mt-3">
        <div class="logo-circle mb-3">
            <i class="fa-solid fa-graduation-cap"></i>
        </div>
        <h2 class="fw-bold mb-1" style="letter-spacing: -0.5px;">Sistema de Incidencias</h2>
        <div class="subtitle">Universidad Nacional</div>
    </div>

    <div class="login-card" style="width: 100%; max-width: 420px;">
        <h4 class="text-center fw-bold mb-4">Iniciar Sesión</h4>

        <div th:if="${error}" class="alert alert-danger text-center p-2 mb-3" role="alert" style="font-size: 0.9rem;">
            <p class="m-0" th:text="${error}"></p>
        </div>

        <form action="/login" method="post">
            
            <div class="mb-4">
                <label class="form-label">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                    <input type="email" name="correo" class="form-control" placeholder="correo@universidad.edu" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="contrasena" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login w-100">Iniciar Sesión</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script th:src="@{/script.js}"></script>
    
</body>
</html>
